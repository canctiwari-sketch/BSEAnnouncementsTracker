<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Wheel Capital - Announcements</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <header>
        <div class="header-row">
            <img src="logo.png" alt="Time Wheel" class="header-logo" onerror="this.style.display='none'">
            <div>
                <h1>Time Wheel Capital Announcements</h1>
                <p class="subtitle">BSE + NSE corporate announcements &middot; Updated hourly</p>
            </div>
        </div>
    </header>

    <div class="controls">
        <div class="multi-select-wrap">
            <span class="multi-label">Category</span>
            <div class="multi-select" id="categoryFilter" tabindex="0">
                <span class="multi-select-text">All</span>
                <div class="multi-select-dropdown" id="categoryDropdown"></div>
            </div>
        </div>
        <label>
            Min MCap (Cr)
            <input type="number" id="mcapMin" placeholder="e.g. 500" onchange="applyFilter()" min="0">
        </label>
        <label>
            Max MCap (Cr)
            <input type="number" id="mcapMax" placeholder="e.g. 50000" onchange="applyFilter()" min="0">
        </label>
        <label class="na-filter-label">
            <input type="checkbox" id="includeNA" onchange="applyFilter()">
            Include N/A MCap
        </label>
        <label class="star-filter-label">
            <input type="checkbox" id="starFilter" onchange="applyFilter()">
            &#9733; Starred Only
        </label>
        <label>
            From
            <input type="date" id="dateFrom" onchange="applyFilter()">
        </label>
        <label>
            To
            <input type="date" id="dateTo" onchange="applyFilter()">
        </label>
        <label>
            Search
            <input type="text" id="searchBox" placeholder="Company, symbol, subject...">
        </label>
        <button class="clear-btn" onclick="clearAllFilters()" title="Clear all filters">Clear Filters</button>
        <button class="export-btn" onclick="exportXLSX()" title="Export filtered results as Excel">Export Excel</button>
    </div>

    <div class="status-bar">
        <div id="status" class="status"></div>
        <div id="refreshInfo" class="refresh-info"></div>
    </div>

    <div id="results">
        <table id="annTable">
            <thead>
                <tr>
                    <th class="sortable" onclick="sortBy('company')">Company <span class="sort-arrow" data-col="company"></span></th>
                    <th class="sortable" onclick="sortBy('market_cap')">Market Cap <span class="sort-arrow" data-col="market_cap"></span></th>
                    <th>Subject</th>
                    <th>AI Summary</th>
                    <th class="sortable" onclick="sortBy('date')">Date <span class="sort-arrow" data-col="date"></span></th>
                    <th>PDF</th>
                </tr>
            </thead>
            <tbody id="annBody"></tbody>
        </table>
    </div>

    <div id="pagination" class="pagination" style="display:none">
        <button id="prevBtn" onclick="prevPage()" disabled>&laquo; Previous</button>
        <span id="pageNum">Page 1 of 1</span>
        <button id="nextBtn" onclick="nextPage()">Next &raquo;</button>
        <span id="pageInfo" class="page-info">1–50 of 100</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
