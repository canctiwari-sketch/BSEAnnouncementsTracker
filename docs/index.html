<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Wheel Capital - Announcements</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <header>
        <div class="header-row">
            <img src="logo.png" alt="Time Wheel" class="header-logo" onerror="this.style.display='none'">
            <div>
                <h1>Time Wheel Capital Announcements</h1>
                <p class="subtitle">BSE + NSE corporate announcements &middot; Updated hourly</p>
            </div>
        </div>
    </header>

    <div class="controls">
        <div class="multi-select-wrap">
            <span class="multi-label">Category</span>
            <div class="multi-select" id="categoryFilter" tabindex="0">
                <span class="multi-select-text">All</span>
                <div class="multi-select-dropdown" id="categoryDropdown"></div>
            </div>
        </div>
        <label>
            Min MCap (Cr)
            <input type="number" id="mcapMin" placeholder="e.g. 500" onchange="applyFilter()" min="0">
        </label>
        <label>
            Max MCap (Cr)
            <input type="number" id="mcapMax" placeholder="e.g. 50000" onchange="applyFilter()" min="0">
        </label>
        <label class="na-filter-label">
            <input type="checkbox" id="includeNA" onchange="applyFilter()">
            Include N/A MCap
        </label>
        <label class="star-filter-label">
            <input type="checkbox" id="starFilter" onchange="applyFilter()">
            &#9733; Starred Only
        </label>
        <label>
            From
            <input type="date" id="dateFrom" onchange="applyFilter()">
        </label>
        <label>
            To
            <input type="date" id="dateTo" onchange="applyFilter()">
        </label>
        <label>
            Search
            <input type="text" id="searchBox" placeholder="Company, symbol, subject...">
        </label>
        <button class="clear-btn" onclick="clearAllFilters()" title="Clear all filters">Clear Filters</button>
        <button class="export-btn" onclick="exportXLSX()" title="Export filtered results as Excel">Export Excel</button>
        <button class="watchlist-btn" onclick="openWatchlist()" title="View Watchlist">&#9734; Watchlist <span id="wlCount">(0)</span></button>
        <button class="lookup-btn" onclick="openLookup()" title="Company History Lookup">&#128269; Lookup</button>
    </div>

    <div class="status-bar">
        <div id="status" class="status"></div>
        <div id="refreshInfo" class="refresh-info"></div>
    </div>

    <div id="results">
        <table id="annTable">
            <thead>
                <tr>
                    <th class="sortable" onclick="sortBy('company')">Company <span class="sort-arrow" data-col="company"></span></th>
                    <th class="sortable" onclick="sortBy('market_cap')">Market Cap <span class="sort-arrow" data-col="market_cap"></span></th>
                    <th>Subject</th>
                    <th>AI Summary</th>
                    <th class="sortable" onclick="sortBy('date')">Date <span class="sort-arrow" data-col="date"></span></th>
                    <th>PDF</th>
                </tr>
            </thead>
            <tbody id="annBody"></tbody>
        </table>
    </div>

    <div id="pagination" class="pagination" style="display:none">
        <button id="prevBtn" onclick="prevPage()" disabled>&laquo; Previous</button>
        <span id="pageNum">Page 1 of 1</span>
        <button id="nextBtn" onclick="nextPage()">Next &raquo;</button>
        <span id="pageInfo" class="page-info">1–50 of 100</span>
    </div>

    <div id="watchlistOverlay" class="wl-overlay" style="display:none" onclick="if(event.target===this)closeWatchlist()">
        <div class="wl-modal">
            <div class="wl-modal-header">
                <h2>&#9734; Watchlist</h2>
                <div class="wl-header-actions">
                    <button class="wl-export-btn" onclick="exportWatchlist()" title="Backup watchlist">Export</button>
                    <label class="wl-import-btn" title="Restore watchlist">
                        Import
                        <input type="file" id="wlImportFile" accept=".json" onchange="importWatchlist(event)" style="display:none">
                    </label>
                    <button class="wl-close-btn" onclick="closeWatchlist()">&times;</button>
                </div>
            </div>
            <div id="wlContent" class="wl-modal-body"></div>
        </div>
    </div>

    <!-- Company Lookup Modal -->
    <div id="lookupOverlay" class="lookup-overlay" style="display:none" onclick="if(event.target===this)closeLookup()">
        <div class="lookup-modal">
            <div class="lookup-modal-header">
                <h2>&#128269; Company History Lookup</h2>
                <button class="lookup-close-btn" onclick="closeLookup()">&times;</button>
            </div>
            <div class="lookup-modal-body">
                <div class="lookup-search-row">
                    <div class="lookup-input-wrap">
                        <input type="text" id="lookupInput" class="lookup-input"
                            placeholder="Type company name..."
                            oninput="onLookupInput()" onkeydown="onLookupKeyDown(event)"
                            autocomplete="off">
                        <div id="lookupSuggest" class="lookup-suggest" style="display:none"></div>
                    </div>
                    <button id="lookupFetchBtn" class="lookup-fetch-btn" onclick="triggerLookup()" disabled>Fetch 3 Yrs</button>
                    <button id="researchBtn" class="research-fetch-btn" onclick="triggerResearch()" disabled title="Generate full 10-15 page deep-dive research report (~5-10 min)">🔬 Deep Research</button>
                </div>
                <div id="lookupStatus" class="lookup-status" style="display:none"></div>
                <div id="lookupResults" style="display:none">
                    <div class="lookup-result-header">
                        <span id="lookupResultTitle"></span>
                        <button class="lookup-clear-btn" onclick="clearLookup()">&#128465; Clear Results</button>
                    </div>
                    <div class="lookup-table-wrap">
                        <table class="lookup-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Category</th>
                                    <th>Subject</th>
                                    <th>PDF</th>
                                </tr>
                            </thead>
                            <tbody id="lookupBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
