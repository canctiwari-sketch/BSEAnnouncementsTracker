name: Fetch Announcements

on:
  schedule:
    # Run every hour at :05 (IST = UTC+5:30)
    - cron: '5 * * * *'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests==2.32.3 "httpx[http2]==0.28.1" pypdf==5.4.0

      - name: Run fetch worker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python worker/fetch.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update announcements $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Fetch Announcements workflow failed! Check logs above for details."
          echo "## Workflow Failed" >> $GITHUB_STEP_SUMMARY
          echo "The Fetch Announcements job failed at $(date -u +%Y-%m-%dT%H:%M:%S)Z." >> $GITHUB_STEP_SUMMARY
          echo "Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY
