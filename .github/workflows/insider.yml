name: Insider Trades Update

on:
  schedule:
    - cron: '30 3 * * 1-5'   # 9:00 AM IST weekdays (03:30 UTC)
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Force full 1-year backfill (overwrites existing data)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests httpx[http2]

      - name: Fetch insider trades
        env:
          INSIDER_BACKFILL: ${{ inputs.backfill || 'false' }}
        run: python worker/insider.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/insider.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Insider trades: $(date +'%Y-%m-%d')"
            git push
          fi
